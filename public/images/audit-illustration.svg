<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset="1" stop-color="#eef2ff" stop-opacity=".92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity=".25"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="720" fill="none"/>
  <!-- main sheet -->
  <g filter="url(#shadow)">
    <rect x="90" y="60" rx="18" ry="18" width="620" height="600" fill="url(#bg)" stroke="#D6DBE7" stroke-width="2"/>
    <rect x="90" y="60" rx="18" ry="18" width="620" height="84" fill="#F7FAFF" stroke="#D6DBE7" stroke-width="2"/>
    <!-- header -->
    <g transform="translate(120,92)">
      <rect x="0" y="-18" width="34" height="34" rx="10" fill="#2EE6A6"/>
      <path d="M10 0 l6 6 l12 -14" fill="none" stroke="#071015" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="54" y="8" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="800" fill="#0F172A">Accessibility Audit</text>
    </g>

    <!-- section title -->
    <text x="120" y="200" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" font-weight="800" fill="#0F172A">Audit Findings</text>

    <!-- table header -->
    <g transform="translate(120,228)">
      <rect x="0" y="0" width="560" height="44" rx="10" fill="#EEF2FF" stroke="#D6DBE7"/>
      <text x="20" y="29" font-family="system-ui" font-size="16" font-weight="700" fill="#334155">Severity</text>
      <text x="190" y="29" font-family="system-ui" font-size="16" font-weight="700" fill="#334155">Occurrences</text>
      <text x="360" y="29" font-family="system-ui" font-size="16" font-weight="700" fill="#334155">Description</text>
    </g>

    <!-- rows -->
    <g transform="translate(120,280)" font-family="system-ui" font-size="15" fill="#0F172A">
      <rect x="0" y="0" width="560" height="62" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="16" y="16" width="88" height="30" rx="10" fill="#F87171"/>
      <text x="36" y="37" font-weight="800" fill="#fff">High</text>
      <text x="215" y="38" font-weight="800">5</text>
      <rect x="350" y="22" width="180" height="8" rx="4" fill="#CBD5E1"/>
      <rect x="350" y="38" width="140" height="8" rx="4" fill="#E2E8F0"/>

      <rect x="0" y="76" width="560" height="62" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="16" y="92" width="88" height="30" rx="10" fill="#FDBA74"/>
      <text x="28" y="113" font-weight="800" fill="#111827">Medium</text>
      <text x="215" y="114" font-weight="800">12</text>
      <rect x="350" y="98" width="210" height="8" rx="4" fill="#CBD5E1"/>
      <rect x="350" y="114" width="120" height="8" rx="4" fill="#E2E8F0"/>

      <rect x="0" y="152" width="560" height="62" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="16" y="168" width="88" height="30" rx="10" fill="#60A5FA"/>
      <text x="40" y="189" font-weight="800" fill="#fff">Low</text>
      <text x="215" y="190" font-weight="800">7</text>
      <rect x="350" y="174" width="170" height="8" rx="4" fill="#CBD5E1"/>
      <rect x="350" y="190" width="200" height="8" rx="4" fill="#E2E8F0"/>
    </g>

    <!-- bottom cards -->
    <g filter="url(#soft)">
      <rect x="160" y="520" rx="18" ry="18" width="520" height="120" fill="#FFFFFF" stroke="#E2E8F0"/>
      <g transform="translate(190,560)">
        <rect x="0" y="-18" width="34" height="34" rx="10" fill="#2EE6A6"/>
        <path d="M10 0 l6 6 l12 -14" fill="none" stroke="#071015" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="54" y="8" font-family="system-ui" font-size="22" font-weight="800" fill="#0F172A">Prioritized Recommendations</text>
        <rect x="0" y="28" width="440" height="8" rx="4" fill="#CBD5E1"/>
        <rect x="0" y="46" width="380" height="8" rx="4" fill="#E2E8F0"/>
        <rect x="0" y="64" width="410" height="8" rx="4" fill="#E2E8F0"/>
      </g>
    </g>
  </g>

  <!-- magnifier -->
  <g transform="translate(620,240)" filter="url(#soft)">
    <circle cx="110" cy="110" r="96" fill="#E6FFFB" stroke="#22B8CF" stroke-width="6" opacity=".95"/>
    <circle cx="110" cy="110" r="70" fill="#0B1220" opacity=".08"/>
    <rect x="58" y="80" width="120" height="10" rx="5" fill="#0B1220" opacity=".25"/>
    <rect x="58" y="100" width="160" height="10" rx="5" fill="#0B1220" opacity=".18"/>
    <rect x="58" y="120" width="140" height="10" rx="5" fill="#0B1220" opacity=".18"/>
    <rect x="58" y="140" width="110" height="10" rx="5" fill="#0B1220" opacity=".18"/>
  </g>
</svg>
